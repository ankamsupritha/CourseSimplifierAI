<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LearnEase AI | Login</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>LearnEase <span>AI</span></h1>

        <p>Transform Complex Course Materials into Simple Learning Notes</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash">

            {{ messages[0] }}

        </div>
        {% endif %}
        {% endwith %}

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">

                Login

            </button>

        </form>

        <p class="bottom-text">

            Don't have an account?

            <a href="/register">

                Register

            </a>

        </p>

    </div>

</div>

</body>

</html>
